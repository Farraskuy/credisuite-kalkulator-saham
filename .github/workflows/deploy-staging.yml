name: Deploy Kalkulator Saham (Staging)

on:
  push:
    branches:
      - staging

jobs:
  build-and-deploy:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Atur nama folder app, tag image, dan pilih secret sesuai branch
      - name: Set Variables
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            echo "APP_NAME=kalkulator-saham-staging" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
            echo "ENV_CONTENT<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.ENV_STAGING }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "APP_NAME=kalkulator-saham" >> $GITHUB_ENV
            echo "IMAGE_TAG=production" >> $GITHUB_ENV
            echo "ENV_CONTENT<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.ENV_PRODUCTION }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/kalkulator-saham:${{ env.IMAGE_TAG }}

      - name: Create target directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p ../apps/${{ env.APP_NAME }}
            sudo chown -R $USER:$USER ../apps/${{ env.APP_NAME }}

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "../apps/${{ env.APP_NAME }}/"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_NAME: ${{ env.APP_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          OWNER_LC: ${{ env.OWNER_LC }}
          ENV_CONTENT: ${{ env.ENV_CONTENT }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_NAME,IMAGE_TAG,OWNER_LC,ENV_CONTENT,GHCR_PAT,GITHUB_ACTOR
          script: |
            sudo mkdir -p ../apps/$APP_NAME
            sudo chown -R $USER:$USER ../apps/$APP_NAME
            cd ../apps/$APP_NAME

            # Reset dan isi file .env di VPS
            echo "APP_NAME=$APP_NAME" > .env
            echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            echo "OWNER_LC=$OWNER_LC" >> .env
            echo "$ENV_CONTENT" >> .env

            # Login GHCR & jalankan container
            echo "$GHCR_PAT" | sudo docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
            sudo docker compose -p $APP_NAME pull app
            sudo docker compose -p $APP_NAME up -d