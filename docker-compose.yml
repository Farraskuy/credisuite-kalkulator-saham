version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-kalkulator-saham}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
      POSTGRES_DB: kalkulator_saham
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kalkulator_saham"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kalkulator-network

  app:
    image: ghcr.io/${OWNER_LC:-farraskuy}/kalkulator-saham:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-kalkulator-saham}-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-123}@postgres:5432/kalkulator_saham
      SESSION_SECRET: ${SESSION_SECRET:-local-development-secret-change-in-production}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma@6.4.0 db push --skip-generate && node server.js"
    networks:
      - kalkulator-network
      - proxy-network

networks:
  kalkulator-network:
    driver: bridge
  proxy-network:
    external: true

volumes:
  postgres_data:
